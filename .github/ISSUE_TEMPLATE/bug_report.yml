name: Bug report
description: Report a reproducible Onion Core bug
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Onion Core. Please include a minimal reproduction so maintainers can verify the behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: "Pipeline.run raises ... when ..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Provide the smallest runnable code sample, configuration, or test case that reproduces the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect Onion Core to do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include traceback, logs, or failing assertions when useful.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Onion Core Version
      placeholder: "1.1.0b1"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.11.9"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      multiple: true
      options:
        - Pipeline
        - Middleware
        - Provider
        - Agent runtime
        - Redis distributed middleware
        - Observability
        - Packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Middleware order, provider/backend, optional dependencies, or related configuration.
