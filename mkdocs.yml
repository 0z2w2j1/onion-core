# 主题配置
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# 插件配置
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]  # 搜索路径
          options:
            # 文档生成选项
            show_source: true  # 显示源代码链接
            show_root_heading: true  # 显示根标题
            show_root_full_path: false  # 不显示完整路径
            show_object_full_path: false
            show_category_heading: false
            show_bases: true  # 显示基类
            show_signature: true  # 显示函数签名
            show_signature_annotations: true  # 显示类型注解
            separate_signature: true  # 单独显示签名
            line_length: 80  # 签名行长度
            merge_init_into_class: true  # 将 __init__ 合并到类中
            show_docstring_examples: true  # 显示示例
            
            # 继承和成员选项
            inherited_members: true  # 显示继承的成员
            members_order: source  # 按源代码顺序显示成员
            group_by_category: true  # 按类别分组
            
            # 摘要选项
            summary:
              attributes: true
              functions: true
              classes: true
              modules: true
            
            # 文档字符串选项
            docstring_style: google  # Google 风格
            docstring_section_style: table  # 表格样式
            show_if_no_docstring: false  # 没有文档字符串时不显示
            
            # 过滤选项
            filters:
              - "!^_"  # 排除私有成员（除了特殊方法）
              - "^__init__$"  # 但包含 __init__

# Markdown 扩展
markdown_extensions:
  - admonition  # 提示框
  - attr_list
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: 0z2w2j1
      repo: onion-core
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

